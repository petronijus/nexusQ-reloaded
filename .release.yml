name: nexusq-reloaded
tag_format: v{version}
version_files: []                 # tag-only versioning (kernel port milestones)
changelog: CHANGELOG.md
artifacts:
  mode: local                     # built locally (pmbootstrap/Docker), not in GitHub CI
  # PUBLIC_RELEASE=1: release artifacts must NOT contain the baked personal
  # access (WiFi PSK / ssh keys) — the preflight below verifies it.
  local_build: PUBLIC_RELEASE=1 ./docker-build.sh
  # Build emits output/boot.img + output/google-steelhead.img; the release step
  # renames to the versioned scheme and sparse-converts the rootfs (raw2simg.py),
  # matching the v0.1.0 assets:
  local_upload:
    - nexusq-boot-v*.img
    - nexusq-rootfs-v*-sparse.img.zst   # rootfs is zstd-compressed (all-RAW sparse > 2 GiB GitHub asset limit)
registry:
  images: []
preflight_extra:
  # Refuse to publish a rootfs with baked-in personal access (WiFi PSK /
  # ssh authorized_keys) — release artifacts must come from
  # PUBLIC_RELEASE=1 ./docker-build.sh, this verifies it.
  - scripts/release-preflight-no-secrets.sh
