org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin's incremental-compilation cache computes relative paths between the
# pub cache (typically on C:) and this project (on D:). On Windows, files on
# different drive roots have no relative path, which throws inside the
# Kotlin Build Tools API when it tries to close/relocate its caches (seen
# first via video_player_android's compileDebugKotlin in Task 13). Disabling
# Kotlin incremental compilation avoids the cross-drive relative-path crash;
# it costs a slightly slower rebuild, not correctness.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
