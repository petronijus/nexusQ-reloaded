# Pin PulseAudio to 48 kHz and resample 44.1 kHz content up to it.
#
# Both device outputs clock only the 48 kHz family cleanly:
#  - the OMAP4 McASP S/PDIF (DIT) at 44.1 kHz logs "Sample-rate is off by 88435
#    PPM" (== the 48000/44100 ratio) -> detuned / unlocked optical output;
#  - the McBSP2 -> TAS5713 link is designed around an exact 48 kHz FSYNC
#    (kernel patch 0022 CLKGDV).
# So run every sink at 48 kHz and let PA resample 44.1 kHz sources (Spotify is
# 44.1 kHz). avoid-resampling=false keeps the sink pinned to default-sample-rate
# instead of switching it to the stream's 44.1 kHz.
default-sample-rate = 48000
alternate-sample-rate = 48000
avoid-resampling = false
