# Nexus Q audio: the McBSP2 -> TAS5713 link can only clock the 48 kHz family
# cleanly (OMAP4 ABE is 196.608 MHz = 4096x48k; there is no 44.1k-family clock).
# So expose a resampling PCM that always drives the hardware at 48000 Hz and let
# ALSA's plug converter handle 44.1k (Spotify) and everything else. With the
# kernel CLKGDV fix this yields an exact 48 kHz FSYNC -> correct pitch/tempo.
# Card NUMBERS are not stable across boots on this device (TAS5713 vs HDMI race),
# so the slave PCM is addressed by card NAME, not number.
pcm.nexusq {
    type plug
    slave {
        pcm "hw:CARD=NexusQSpeaker,0"
        rate 48000
        format S16_LE
        channels 2
    }
    hint {
        show on
        description "Nexus Q speaker (TAS5713, 48 kHz resampled)"
    }
}

ctl.nexusq {
    type hw
    card NexusQSpeaker
}

# Software master-volume control. A single ALSA control ("NexusQ") becomes the
# one volume knob shared by librespot (--mixer alsa --alsa-mixer-control NexusQ)
# and the companion bridge (nexusq-control reads/writes it via amixer), so
# Spotify-Connect volume and companion volume stay in lockstep. Wraps the
# resampling `nexusq` PCM above. The control is registered on the NexusQSpeaker
# card's control interface the first time this PCM is opened (by librespot).
pcm.nexusq_soft {
    type softvol
    slave.pcm "nexusq"
    control {
        name "NexusQ"
        card NexusQSpeaker
    }
}
