# Nexus Q audio: the McBSP2 -> TAS5713 link can only clock the 48 kHz family
# cleanly, so everything runs at 48000 Hz. The "nexusq" PCM TEES the stream to
# BOTH the speaker AND the snd-aloop loopback (hw:Loopback,0) so nexusqd's audio
# tap (arecord on hw:Loopback,1 @ 48 kHz, see userspace/nexusqd) drives the LED
# music visualizer while the speaker plays. The speaker is the timing master; the
# loopback is paced by snd-aloop's timer and dropped if nexusqd isn't reading, so
# it never stalls playback.
pcm.nexusq {
    type plug
    slave.pcm "nexusq_tee"
    slave.rate 48000
    slave.format S16_LE
    slave.channels 2
}

# Duplicate the 2 input channels into the 4 channels of the multi (L,R -> speaker
# L,R AND loopback L,R).
pcm.nexusq_tee {
    type route
    slave.pcm "nexusq_both"
    slave.channels 4
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 1
    ttable.1.3 1
}

# Two physical slaves: a = TAS5713 speaker (by name), b = snd-aloop playback side.
pcm.nexusq_both {
    type multi
    slaves.a.pcm "plughw:CARD=NexusQSpeaker,0"
    slaves.a.channels 2
    slaves.b.pcm "plughw:CARD=Loopback,0,0"
    slaves.b.channels 2
    bindings.0.slave a
    bindings.0.channel 0
    bindings.1.slave a
    bindings.1.channel 1
    bindings.2.slave b
    bindings.2.channel 0
    bindings.3.slave b
    bindings.3.channel 1
}

ctl.nexusq {
    type hw
    card NexusQSpeaker
}

# Software master-volume control. A single ALSA control ("NexusQ") becomes the
# one volume knob shared by librespot (--mixer alsa --alsa-mixer-control NexusQ)
# and the companion bridge (nexusq-control reads/writes it via amixer), so
# Spotify-Connect volume and companion volume stay in lockstep. Wraps the
# resampling `nexusq` PCM above. The control is registered on the NexusQSpeaker
# card's control interface the first time this PCM is opened (by librespot).
pcm.nexusq_soft {
    type softvol
    slave.pcm "nexusq"
    control {
        name "NexusQ"
        card NexusQSpeaker
    }
}
