# bluez ships /etc/bluetooth at mode 0755 but bluetooth.service sets
# ConfigurationDirectoryMode=0555, so systemd logs "ConfigurationDirectory
# 'bluetooth' already exists but mode is different (755 vs 555)" every boot.
# Align the expected mode with the shipped directory (0755 is fine for a
# world-readable config dir); silences the warning without touching bluez.
[Service]
ConfigurationDirectoryMode=0755
