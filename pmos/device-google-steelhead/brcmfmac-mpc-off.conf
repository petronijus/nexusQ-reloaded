# BCM4330 on the Google Nexus Q: keep the Wi-Fi radio always on.
#
# brcmfmac forces the firmware "mpc" (Minimum Power Consumption) iovar to 1,
# letting the firmware power the radio down whenever the interface is idle. The
# BCM4330 lacks the NEED_MPC quirk (only the BCM4329 has it) and P2P is disabled,
# so mpc is never toggled back off -- the radio sleeps and bulk transfers stall
# with 270-530 ms latency + ~30% packet loss when traffic resumes (strong signal
# notwithstanding). The Nexus Q is mains-powered, so disable mpc -- matching the
# stock Android bcmdhd vendor driver, which sets mpc=0. Requires the brcmfmac
# "mpc" module parameter (kernel patch 0021).
options brcmfmac mpc=0
