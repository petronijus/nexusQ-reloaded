# BCM4330 firmware advertises "p2p" in its capability list but cannot create the
# modern P2P_DEVICE interface -- the p2p_disc handshake times out (no
# BRCMF_E_IF_ADD), so every p2p-dev creation fails and the firmware's orphaned
# P2P_PROBEREQ events spam the log with "event handler failed (72)".
#
# Disable the P2P feature so brcmfmac never advertises P2P_DEVICE; then neither
# wpa_supplicant nor NetworkManager attempt it. BRCMF_FEAT_P2P is enum index 4,
# so BIT(4) = 16. The Nexus Q does not use Wi-Fi Direct, so nothing is lost.
options brcmfmac feature_disable=16
