# Never auto-generate a "Wired connection 1" profile for eth0 — the baked
# eth-lan/eth-direct profiles own the port. The auto-generated profile's
# endless DHCP retry loop bounced the carrier every ~47 s on a wire with
# no DHCP server and failed NetworkManager-wait-online (2026-07-04).
[main]
no-auto-default=eth0
