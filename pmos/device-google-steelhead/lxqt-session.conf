[General]
# Nexus Q: pin the LXQt-Wayland compositor to labwc system-wide so
# startlxqtwayland launches the full lxqt-session directly (skips the
# first-run compositor picker). labwc is the only wlroots compositor that
# runs without GPU acceleration here. Installed to /etc/xdg/lxqt/session.conf,
# which startlxqtwayland reads via XDG_CONFIG_DIRS.
compositor=labwc
