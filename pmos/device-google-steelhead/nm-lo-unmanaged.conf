# The loopback interface never needs NetworkManager management or dispatcher
# events. Leaving it managed makes NM fire the dispatcher scripts for `lo` very
# early at boot — before wlan0 has a lease — and the shipped
# /usr/lib/NetworkManager/dispatcher.d/50-dns-filter.sh (postmarketos-base-ui-
# networkmanager) has no interface guard, so it exits 1 ("unable to determine IP
# config for primary connection") on the lo `up` event every boot. lo is special
# (kernel-managed, always up); marking it unmanaged is correct and stops the
# spurious dispatcher run. (Upstream pmaports bug filed separately: the script
# should guard `lo` / treat the not-ready state as non-fatal.)
[device-lo]
match-device=interface-name:lo
managed=0
