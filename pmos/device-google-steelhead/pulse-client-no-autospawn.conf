# PulseAudio is started exactly once per session by the XDG autostart
# (/etc/xdg/autostart/pulseaudio.desktop -> start-pulseaudio-x11). With client
# autospawn left at its default (on), the LXQt volume applet / gsettings-helper
# each spawn a second daemon during session start, which loses the race and logs
# "pid.c: Daemon already running" every boot. Clients should connect to the
# already-running daemon over its socket, not autospawn — disable it.
autospawn = no
