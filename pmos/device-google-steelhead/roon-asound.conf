# Default ALSA device INSIDE the glibc rootfs = PulseAudio. RoonBridge/RAATServer
# then see and use the "pulse" PCM, so audio lands in the same PA hub as every
# other input (librespot/shairport); OUTPUT + volume stay in PA. /dev/snd is
# deliberately NOT bound into the sandbox, so Roon cannot grab a raw hw device and
# fight PA — the only path out is pulse. Installed to /opt/glibc-rt/etc/asound.conf.
pcm.!default { type pulse }
ctl.!default { type pulse }
