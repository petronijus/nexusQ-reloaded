// Shairport Sync (AirPlay 1) config for the Nexus Q.
//
// AirPlay is one INPUT into the PulseAudio hub, exactly like librespot (Spotify
// Connect): the ALSA `pulse` plugin routes shairport-sync -> PulseAudio, so the
// OUTPUT (TAS5713 / SPDIF / HDMI) and volume live in PA and follow the companion
// app's default-sink selection. No direct ALSA hw access here.
//
// The service NAME is NOT set here — the shairport-nexusq wrapper passes it with
// -a from /etc/nexusq/device.json (the same identity file librespot reads), so
// the AirPlay picker shows whatever name the user set in onboarding.
//
// The Alpine shairport-sync 5.1 build has audio backends alsa/pipe/stdout only
// (no native `pa` backend), so we use the alsa backend pointed at the ALSA
// `pulse` PCM — the identical trick librespot uses (--backend alsa --device pulse).

general = {
  output_backend = "alsa";
  // volume follows the AirPlay sender's slider; PA still owns the sink volume.
  volume_range_db = 60;

  // PINNED ports so the firewall can open exactly these (the input policy is
  // default-drop). RTSP control on 5000/tcp; the three AirPlay-1 UDP streams
  // (audio/control/timing) in 6001-6010. 61_airplay.nft opens this exact set.
  port = 5000;
  udp_port_base = 6001;
  udp_port_range = 10;
};

alsa = {
  output_device = "pulse";
};
