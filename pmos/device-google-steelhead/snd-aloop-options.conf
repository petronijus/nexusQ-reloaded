# snd-aloop: TWO loopback cards (module loaded once via modules-load.d).
#
#  - card "Loopback" (index 0, 8 substreams): the existing internal plumbing —
#    the asound.conf multi (speaker + LED-tap feed) and nexusqd's audio tap.
#  - card "RoonLoop" (index 7, 1 substream): Roon Bridge's PRIVATE playback
#    device. Roon (in its bwrap sandbox, which sees ONLY this card) plays into
#    hw:RoonLoop,0,0; PulseAudio captures hw:RoonLoop,1,0 (roon_in source loaded
#    by roon-nexusq) and loops it to the default sink.
#
# index=0,7 is CRITICAL: without it the second aloop card would claim index 1 at
# boot (modules-load runs before the platform sound cards probe) and shift
# HDMI/tas5713/spdif — ALSA card indexes are probe-order dependent (v1.6.9
# lesson), everything else matches cards by NAME or platform path.
# pcm_substreams=8,1: RoonLoop needs exactly one pair; Loopback keeps stock 8.
options snd-aloop enable=1,1 index=0,7 id=Loopback,RoonLoop pcm_substreams=8,1
