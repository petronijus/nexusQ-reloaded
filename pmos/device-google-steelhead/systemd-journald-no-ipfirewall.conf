# Drop-in for systemd-journald.service on steelhead.
#
# The stock unit ships IPAddressDeny=any (systemd's default journald
# hardening). That configures a cgroup/BPF IP firewall — which this kernel
# does not build (no CONFIG_BPF_SYSCALL/CGROUP_BPF; a deliberate minimal-image
# choice), so systemd logs on every boot:
#   "unit configures an IP firewall, but the local system does not support
#    BPF/cgroup firewalling".
# journald does not open network sockets, so the firewall is moot here.
# Clear the directive so systemd does not try to install a firewall the kernel
# can't enforce — this removes the warning by not requesting an unavailable
# feature (not by masking the message).
[Service]
IPAddressDeny=
