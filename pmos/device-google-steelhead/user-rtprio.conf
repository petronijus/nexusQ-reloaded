# Allow uid-10000 user services to take realtime scheduling up to prio 50.
#
# Roon's RAATServer calls sched_setscheduler(SCHED_FIFO) for its audio threads;
# with the default RLIMIT_RTPRIO=0 that fails ("sched_setscheduler failed:
# Operation not permitted") and RAAT runs at normal priority — one of the two
# causes of choppy Roon playback found live 2026-07-17 (the other was RAAT's
# 40 ms ALSA buffer, cushioned by module-loopback latency + the Core-side
# "Buffer Size" device setting). Children of the user manager inherit the
# rlimit, so RAAT's own RT request simply succeeds — no external chrt needed.
# Scoped to user@10000 (the appliance session), not all users.
[Service]
LimitRTPRIO=50
