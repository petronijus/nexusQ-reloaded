# Nexus Q (steelhead) device-specific weston config.
# pmOS uses /etc/xdg/weston/weston.ini (shipped by the device package) in
# preference to weston.ini.default from postmarketos-ui-weston.
#
# Software rendering only until the PowerVR SGX540 GPU driver lands
# (see docs/2026-06-19-gpu-sgx540-acceleration-research.md). On a single
# Cortex-A9 the pixman 2D path is lighter and more responsive than the GL
# renderer running on llvmpipe, so force it explicitly.
[core]
backend=drm-backend.so
renderer=pixman
xwayland=false
idle-time=0
# Device is headless (no keyboard/mouse). The DRM backend otherwise aborts with
# "failed to create input devices" when it finds none on startup.
require-input=false

[shell]
# #000F14 — the Nexus Q idle colour (matches the LED ring idle, see nexusqd).
background-color=0xff000f14
panel-position=bottom
