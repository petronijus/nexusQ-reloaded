# Disable NetworkManager WiFi power-save on the Nexus Q (BCM4330).
#
# With power-save ON the brcmfmac BCM4330 had severe latency jitter — ping avg
# ~175 ms with spikes to ~545-660 ms. Disabling it gives a stable ~15 ms avg
# (validated 2026-06-22). 2 = disable, 3 = enable.
#
# NB: this only fixes latency/responsiveness; sustained bulk throughput is a
# separate brcmfmac/firmware limitation on this 2012 chip (see SMP/wifi docs).
[connection]
wifi.powersave = 2
