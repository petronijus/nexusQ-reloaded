# Pin WiFi to the hardware (permanent) MAC on the Nexus Q (BCM4330).
#
# Without this the wlan0 connection came up with a RANDOMIZED locally-
# administered MAC (e.g. 8a:d8:d9:ac:c6:e5 instead of the hardware
# f8:8f:ca:20:48:e1), so every boot pulled a fresh DHCP lease and the device
# "moved IP" (192.168.20.179 -> .142 -> ...), breaking the documented ssh path
# (observed 2026-07-02). Cloning the permanent MAC pins the lease/IP.
#
# scan-rand is disabled too: the 2012-era BCM4330 firmware gains nothing from
# scan MAC randomization and per-scan MAC churn confuses some APs' band-steering.
[connection-wifi-stable-mac]
match-device=type:wifi
wifi.cloned-mac-address=permanent

[device-wifi-no-scan-rand]
match-device=type:wifi
wifi.scan-rand-mac-address=no
